{{ define "main" }}
<main>
  {{ .Content }}
  <ul class="blog-posts">
    {{ range .Pages }}
    <li>
      <time datetime='{{ .Date.Format "2006-01-02" }}' pubdate>
        {{ .Date.Format (default "02 Jan, 2006" .Site.Params.dateFormat) }}
      </time>
      //
      <a href="{{ .Permalink }}">{{ .Params.title }}</a>
    </li>
    {{ else }}
    <li>
      No posts yet
    </li>
    {{ end }}
  </ul>
</main>
{{ end }}
